<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="../CSS/currency_converter.css">
</head>
<body>
    <main class="container">
        <h2>Currency Converter</h2>
        <div class="input-container">
            <select name="currency" id="currency-first">
                <option value="AUD" >AUD</option>
                <option value="CAD" >CAD</option>
                <option value="EUR" >EUR</option>
                <option value="GBP" >GBP</option>
                <option value="INR" >INR</option>
                <option value="JPY">JPY</option>
                <option value="GHS">GHS</option>
                <option value="USD" selected>USD</option>
            </select>
            <input type="number" id="input-first" value="1">
        </div>
        <div class="input-container">
            <select name="currency" id="currency-second">
                <option value="AUD" >AUD</option>
                <option value="CAD" >CAD</option>
                <option value="EUR" selected>EUR</option>
                <opxtion value="GBP" >GBP</opxtion>
                <option value="INR" >INR</option>
                <option value="JPY">JPY</option>
                <option value="GHS">GHS</option>
                <option value="USD" >USD</option>            </select>
            <input type="number" id="input-second" disabled>
        </div>
        <input type="text" class="ex-rate" id="ex-rate" value="1 USD = 12.32 GHS" readonly>
    </main>
    <script src="../JS/currency_converter.js"></script>
</body>
</html>
